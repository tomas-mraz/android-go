--- 
GENERATOR: 
  PackageName: gles
  PackageDescription: "Package gles provides Go bindings for the OpenGL ES v1 API."
  PackageLicense: "THE AUTOGENERATED LICENSE. ALL THE RIGHTS ARE RESERVED BY ROBOTS."
  FlagGroups:
    - {name: LDFLAGS, flags: [-lGLESv1_CM]}
  SysIncludes:
    - GLES/gl.h

PARSER:
  Arch: arm
  SourcesPaths:
    - GLES/gl.h
  IncludePaths:
    - /home/tomas/Android/Sdk/ndk/26.3.11579264/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include
  SysIncludePaths:
    - /home/tomas/Android/Sdk/ndk/26.3.11579264/toolchains/llvm/prebuilt/linux-x86_64/lib/clang/17/include
    - /home/tomas/Android/Sdk/ndk/26.3.11579264/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include
  Defines:
    __ANDROID__: 1
    __ANDROID_API__: 29
    __BIONIC_VERSIONER: 1

TRANSLATOR: 
  ConstRules: 
    defines: expand
    enum: expand
  TypeTips:
    function:
      # do not stick with GL types, use Go types for API instead
      - {target: ., self: plain, tips: [plain,plain,plain,plain,plain,plain,plain,plain,plain]}
  Rules: 
    global:
      - {action: accept, from: "^GL"}
      - {action: replace, from: "^GL"}
    function:
      - {action: accept, from: ^gl}
      - {action: replace, from: ^gl}
      - {transform: export}
    type:
      - {action: replace, from: "_t$"}
      - {transform: export}
      - {load: snakecase}
    const:
      - {action: replace, from: "^_"}
    private:
      - {transform: unexport}
      - {load: snakecase}
    post-global:
      - {action: doc, from: "^gl",
              to: "https://www.khronos.org/opengles/sdk/1.1/docs/man/$name.xml"}
